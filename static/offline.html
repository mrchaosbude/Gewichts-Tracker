<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eaeaea;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .offline-container {
      text-align: center;
      max-width: 400px;
    }
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
    }
    p {
      color: #a0a0a0;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 1rem;
    }
    .btn-primary {
      background: #007bff;
      color: #fff;
    }
    .hint {
      margin-top: 2rem;
      padding: 1rem;
      background: rgba(255,255,255,0.05);
      border-radius: 0.5rem;
      font-size: 0.85rem;
      color: #a0a0a0;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">&#128268;</div>
    <h1>Keine Internetverbindung</h1>
    <p>Diese Seite wurde noch nicht offline gespeichert.</p>
    <button class="btn btn-primary" onclick="location.reload()">Erneut versuchen</button>
    <div class="hint">
      <strong>Tipp:</strong> Besuche die Seiten einmal online, damit sie offline verfügbar werden.
      Bereits besuchte Seiten werden automatisch gespeichert.
    </div>
  </div>
</body>
</html>
