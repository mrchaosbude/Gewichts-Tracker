<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Vorlagen-Trainingspläne</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  </head>
  <body>
    <div class="container mt-4">
      <h2>Vorlagen-Trainingspläne</h2>
      <ul class="list-group">
        {% for tpl in templates %}
          <li class="list-group-item d-flex justify-content-between align-items-center">
            <span>{{ tpl.title }} - {{ tpl.description }} {% if not tpl.is_visible %}(Unsichtbar){% endif %}</span>
            <div>
              {% if current_user.is_admin or current_user.is_trainer %}
                <a href="{{ url_for('edit_template', template_id=tpl.id) }}" class="btn btn-primary btn-sm">Bearbeiten</a>
                <form action="{{ url_for('toggle_template_visibility', template_id=tpl.id) }}" method="POST" style="display:inline;" onsubmit="return confirm('Sichtbarkeit umschalten?');">
                  <button type="submit" class="btn btn-warning btn-sm">
                    {% if tpl.is_visible %}Unsichtbar setzen{% else %}Sichtbar setzen{% endif %}
                  </button>
                </form>
                <form action="{{ url_for('delete_training_plan', training_plan_id=tpl.id) }}" method="POST" style="display:inline;" onsubmit="return confirm('Vorlage wirklich löschen?');">
                  <button type="submit" class="btn btn-danger btn-sm">Löschen</button>
                </form>
              {% else %}
                <form action="{{ url_for('add_template', template_id=tpl.id) }}" method="POST" style="display:inline;" onsubmit="return confirm('Vorlage zu deinem Konto hinzufügen?');">
                  <button type="submit" class="btn btn-success btn-sm">Hinzufügen</button>
                </form>
              {% endif %}
            </div>
          </li>
        {% endfor %}
      </ul>
      <a href="{{ url_for('dashboard') }}" class="btn btn-secondary btn-block mt-3">Zurück</a>
    </div>
  </body>
</html>
